# ~/.config/hugin/meetings.yaml  (meetings-specific)
# ----------------------------------------------------------------
# Shared fields (language, vault_path, journal_path, gws_bin, ...) live
# in ~/.config/hugin/hugin.yaml — see the `hugin` package for the
# canonical example. Run `hugin-init` to scaffold both files.

meetings:
  # Where transcripts and summaries are written (usually inside your vault).
  transcripts_dir: ~/Documents/notes/meetings/transcripts
  summaries_dir:   ~/Documents/notes/meetings/summaries

  # Cache / state (raw audio, models, speaker embeddings). Safe to wipe.
  state_dir: ~/.hugin_audio

  # Whisper
  whisper_model: large-v3
  compute_type:  float16

  # Local llama.cpp summarization. Leave unset for auto (all layers on GPU
  # for models <= threshold, hybrid split above). Set summarize_n_gpu_layers
  # explicitly to override — 0 forces pure CPU, any positive int caps GPU
  # layers for low-VRAM setups.
  # summarize_n_gpu_layers: 20
  # summarize_hybrid_threshold_gb: 10.0
  # summarize_hybrid_n_gpu_layers: 10

  # Prompt and summary formatting. Paths may be absolute or use ~.
  # summarize_prompt_path: ~/Documents/notes/config/hugin/summary_prompt.md
  # "default" omits provider-specific model flags and lets the CLI choose.
  summary_model: default
  summary_effort: high              # codex/claude only; ignored by gemini
  summary_header: "## Meeting Summary"
  # personal_section_header: "### For Me"

  # LLM provider for non-local models. Supported: codex, claude, gemini, local.
  # Claude runs from a clean cwd by default to avoid repo-local CLAUDE.md
  # discovery while still allowing your normal Claude Code login to work.
  # Gemini runs from a clean cwd and points context.fileName at a missing file,
  # since the CLI has no exact --bare equivalent.
  # The local provider runs one command per request. The prompt is sent on stdin
  # and stdout is used as the response, so GPU memory is released when it exits.
  llm:
    provider: codex
    # clean_cwd: /tmp/hugin-llm-clean
    # codex_bin: codex
    # claude_bin: claude
    # gemini_bin: gemini
    # claude_args: []               # e.g. ["--effort", "medium"]
    # gemini_disable_context: true
    # Example local llama.cpp command. Adjust the binary, model path, and flags
    # for your installation. Use provider: local to enable it.
    # local_command:
    #   - bash
    #   - -lc
    #   - |
    #     prompt_file=$(mktemp)
    #     cat > "$prompt_file"
    #     llama-cli \
    #       -m "$HOME/.hugin_audio/models/gemma-4.gguf" \
    #       -f "$prompt_file" \
    #       -n 2048 \
    #       --temp 0.3 \
    #       --no-display-prompt
    #     status=$?
    #     rm -f "$prompt_file"
    #     exit "$status"

  # Project / customer matching. Points at a directory of markdown notes
  # (one per project/customer). Leave unset to disable matching.
  project_matcher:
    projects_dir: ~/Documents/notes/projects
    # Note representing your own organization — gets priority in matching.
    # Leave empty when you do not have a special internal project/customer note.
    internal_project: ""
    model: default
    effort: low                     # codex/claude only; ignored by gemini
    # prompt_path: ~/Documents/notes/config/hugin/project_matcher_prompt.md
    json_system_prompt: "Return only valid JSON."
    inactive_dir_names:
      - inactive
      - inaktiva
